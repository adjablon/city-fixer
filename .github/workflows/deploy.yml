name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Upload artifact for rollback
        uses: actions/upload-artifact@v4
        with:
          name: city-fix-jar
          path: target/city-fix-0.0.1-SNAPSHOT.jar
          retention-days: 30

      - name: Deploy to Azure App Service
        run: |
          curl -X POST \
            -u "${{ secrets.AZURE_WEBAPP_PUBLISH_USER }}:${{ secrets.AZURE_WEBAPP_PUBLISH_PASS }}" \
            --data-binary @target/city-fix-0.0.1-SNAPSHOT.jar \
            -H "Content-Type: application/octet-stream" \
            "https://cityfix-app-aj.scm.azurewebsites.net/api/publish?type=jar"
